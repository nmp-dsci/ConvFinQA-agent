- description: "test on document: 'Single_JKHY/2009/page_28.pdf-3'"
  metadata:
    type2_question: false 
  vars:
    doc: file://tests/doc1.json
  conversation:
    - user: "What is the net cash from operating activities in 2009?"
    - user: "What about in 2008?"
    - user: "What is the difference?"
    - user: "What percentage change does this represent?"
  assert:
    # Turn 1: net cash from operating activities in 2009 = 206,588
    - type: contains
      value: "206588"
    # Turn 2: net cash from operating activities in 2008 = 181,001
    - type: contains
      value: "181001"
    # Turn 3: difference = 25,587
    - type: contains
      value: "25587"
    # Turn 4: percentage change ~14.1% (25587 / 181001 ≈ 0.14136)
    - type: contains
      value: "14.1"

